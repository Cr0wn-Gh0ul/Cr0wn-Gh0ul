<footer class="site-footer"
  style="flex-shrink:0;left:0;right:0;margin:0 auto;padding:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono','SF Mono','Fira Code','Consolas',monospace;font-size:12px;color:#8a8a9c;height:44px;text-align:center;z-index:1000;width:100%;background:none;box-shadow:none;position:relative;">
  <a href="#" id="scrollTop"
    style="margin-left:16px;margin-right:auto;display:flex;align-items:center;justify-content:center;width:40px;height:40px;font-size:18px;color:#4ade5e;text-decoration:none;opacity:.6;transition:opacity 0.2s;cursor:pointer;flex-shrink:0;">↑</a>
  <p style="width:100%;text-align:center;margin:0;">© 2026 Cr0wn_Gh0ul</p>
  <script>
    // Scroll to top functionality only
    document.addEventListener('DOMContentLoaded', function () {
      const scrollTop = document.getElementById('scrollTop');
      window.addEventListener('scroll', () => {
        if (window.pageYOffset > 300) {
          scrollTop.style.opacity = '1';
          scrollTop.style.pointerEvents = 'auto';
        } else {
          scrollTop.style.opacity = '0.6';
          scrollTop.style.pointerEvents = 'auto';
        }
      });
      scrollTop.addEventListener('click', (e) => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>
  {{ if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11.12.2/+esm'

function getMermaidConfigFromTheme() {
  const styles = getComputedStyle(document.documentElement);
  const cssVar = (name, fallback) => styles.getPropertyValue(name).trim() || fallback;

  const backgroundPrimary = cssVar("--bg-primary", "#1b1b1f");
  const backgroundSecondary = cssVar("--bg-secondary", "#09090a");
  const textPrimary = cssVar("--text-primary", "#ffffff");
  const textSecondary = cssVar("--text-secondary", "#e8eaec");
  const border = cssVar("--border", "#2e2e3a");

  const blue = cssVar("--blue", "#5cb8ff");

  const fontMono = cssVar("--font-mono", "JetBrains Mono, SF Mono, Consolas, monospace");

  return {
    theme: "base",
    xyChart: {
      backgroundColor: backgroundSecondary,
    },
    themeVariables: {
      darkMode: true,
      fontFamily: fontMono,
      fontSize: "14px",
      background: backgroundPrimary,

      primaryColor: blue,
      primaryTextColor: textPrimary,
      secondaryColor: backgroundSecondary,
      secondaryTextColor: textPrimary,

      lineColor: textSecondary,
      textColor: textSecondary,
      edgeLabelBackground: backgroundSecondary,
      titleColor: textPrimary,
      border1: border,
      border2: border,

      xyChart: {
        backgroundColor: backgroundSecondary,
        titleColor: textPrimary,
        xAxisTitleColor: textSecondary,
        xAxisLabelColor: textSecondary,
        xAxisTickColor: textSecondary,
        xAxisLineColor: textSecondary,
        yAxisTitleColor: textSecondary,
        yAxisLabelColor: textSecondary,
        yAxisTickColor: textSecondary,
        yAxisLineColor: textSecondary,
        plotColorPalette: "#5cb8ff,#4ade5e,#ffb454,#ff7070,#f08cff,#7dd3fc,#a3e635,#f59e0b,#f97316,#22d3ee"
      },
    },

    themeCSS: `
      .mermaid svg {
        background-color: ${backgroundSecondary} !important;
      }

      .mermaid .background,
      .mermaid .plot-background,
      .mermaid rect.background {
        fill: ${backgroundSecondary} !important;
      }

      .mermaid svg rect[fill="#fff"],
      .mermaid svg rect[fill="#ffffff"],
      .mermaid svg rect[fill="white"] {
        fill: ${backgroundSecondary} !important;
      }

      .mermaid text,
      .mermaid tspan {
        fill: ${textSecondary} !important;
      }

      .edgeLabel text, .edgeLabel tspan,
      .edgeLabel span, .edgeLabel p,
      .edgeLabel foreignObject *,
      .label text, .label tspan {
        fill: ${textPrimary} !important;
        color: ${textPrimary} !important;
      }
    `,
  };
}

    const mermaidConfig = getMermaidConfigFromTheme();
    mermaid.initialize({
      startOnLoad: false,
      ...mermaidConfig,
    });

    function normalizeChartBackgrounds() {
      document.querySelectorAll('.mermaid svg').forEach((svg) => {
        const svgBox = svg.getBoundingClientRect();
        const svgW = svgBox.width || Number.parseFloat(svg.getAttribute('width') || '0');
        const svgH = svgBox.height || Number.parseFloat(svg.getAttribute('height') || '0');

        let largestCanvasRect = null;
        let largestArea = 0;

        svg.querySelectorAll('rect').forEach((rect) => {
          const fill = (rect.getAttribute('fill') || '').trim().toLowerCase();
          const style = (rect.getAttribute('style') || '').toLowerCase();
          const width = Number.parseFloat(rect.getAttribute('width') || '0');
          const height = Number.parseFloat(rect.getAttribute('height') || '0');
          const area = width * height;

          const isTransparent =
            fill === 'none' ||
            fill === 'transparent' ||
            style.includes('fill:none') ||
            style.includes('fill: none') ||
            style.includes('fill:transparent') ||
            style.includes('fill: transparent');

          // Prefer only rects that are likely full chart canvas backgrounds.
          const likelyCanvasRect =
            (svgW > 0 && svgH > 0 && width >= svgW * 0.6 && height >= svgH * 0.6) ||
            (width >= 120 && height >= 120);

          if (!isTransparent && likelyCanvasRect && area > largestArea) {
            largestArea = area;
            largestCanvasRect = rect;
          }
        });

        // Retint only the largest canvas-like rect, which is typically the chart background.
        if (largestCanvasRect) {
          largestCanvasRect.setAttribute('fill', backgroundSecondary);
          largestCanvasRect.style.fill = backgroundSecondary;
        }
      });
    }

    async function renderAllMermaid() {
      const pending = Array.from(document.querySelectorAll('.mermaid:not([data-processed])'));
      if (!pending.length) return;
      await mermaid.run({ nodes: pending });
      normalizeChartBackgrounds();
    }

    renderAllMermaid();

    // Observe DOM changes to render only newly-added Mermaid blocks.
    const observer = new MutationObserver(() => {
      renderAllMermaid();
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
  {{ end }}
</footer>
